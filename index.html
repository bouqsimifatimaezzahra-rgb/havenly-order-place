<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الطلبات – بيتي على ذوقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --blue: #4A7C9B;
            --blue-light: #6A9EC0;
            --blue-dark: #1A3B4C;
            --warm-bg: #F8F0E3;
            --white: #FFFFFF;
            --text: #2C3E50;
            --shadow: 0 8px 24px rgba(0,0,0,0.06);
            --radius: 20px;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--warm-bg);
            padding: 1.5rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: var(--blue); color: white;
            padding: 1rem 1.5rem; border-radius: 1rem 1rem 0 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 1.5rem; }
        .header a { color: white; background: rgba(255,255,255,0.2); padding: 0.4rem 1rem; border-radius: 2rem; text-decoration: none; }
        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
            gap: 1.2rem; margin: 1.5rem 0;
        }
        .stat-card { background: white; padding: 1rem; border-radius: 1rem; text-align: center; box-shadow: var(--shadow); }
        .stat-card .number { font-size: 1.8rem; font-weight: 800; color: var(--blue); }
        .stat-card .label { font-size: 0.8rem; color: #6b4f3a; }
        .orders-container { background: white; border-radius: 0 0 1rem 1rem; overflow: hidden; }
        .orders-table { width: 100%; border-collapse: collapse; }
        .orders-table th { background: #f4ede5; padding: 0.8rem; text-align: right; font-weight: 700; font-size: 0.8rem; color: #6b4f3a; }
        .orders-table td { padding: 0.8rem; border-bottom: 1px solid #f0e3d6; }
        .order-row { cursor: pointer; transition: 0.2s; }
        .order-row.expanded { background: #f4ede5; }
        .order-status {
            display: inline-block; padding: 0.2rem 0.8rem; border-radius: 30px;
            font-size: 0.7rem; font-weight: 700;
        }
        .status-paid { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-shipped { background: #cce5ff; color: #004085; }
        .status-delivered { background: #d1ecf1; color: #0c5460; }
        .order-details { display: none; padding: 1rem 2rem; background: #faf5ee; }
        .order-details.open { display: block; }
        .order-items { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 0.8rem; }
        .order-item { background: white; padding: 0.8rem; border-radius: 0.8rem; border: 1px solid #e5d5c5; }
        .order-item .item-name { font-weight: 700; }
        .order-item .item-meta { font-size: 0.75rem; color: #6b4f3a; display: flex; flex-wrap: wrap; gap: 0.3rem; }
        .order-item .item-meta span { background: #f0e2cf; padding: 0.1rem 0.6rem; border-radius: 20px; }
        .order-item .item-price { font-weight: 700; color: var(--blue); }
        .btn {
            background: var(--blue); color: white; border: none;
            padding: 0.3rem 0.8rem; border-radius: 2rem; font-weight: 600;
            cursor: pointer; font-size: 0.7rem;
        }
        .btn-outline { background: transparent; border: 2px solid var(--blue); color: var(--blue); }
        .btn-danger { background: #c62828; }
        .btn-danger:hover { background: #b71c1c; }
        .empty-state { text-align: center; padding: 3rem; color: #6b4f3a; }
        .empty-state i { font-size: 3rem; color: #e5d5c5; }
        .back-link { display: inline-block; margin-top: 1rem; color: var(--blue); text-decoration: none; font-weight: 600; }
        @media (max-width: 768px) { .orders-table { font-size: 0.75rem; } .header h1 { font-size: 1.2rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-clipboard-list"></i> الطلبات</h1>
        <a href="add-product.html"><i class="fas fa-plus"></i> إضافة منتج</a>
    </div>

    <div class="stats">
        <div class="stat-card"><div class="number" id="totalOrders">0</div><div class="label">إجمالي الطلبات</div></div>
        <div class="stat-card"><div class="number" id="totalRevenue">0</div><div class="label">الإيرادات (ر.س)</div></div>
        <div class="stat-card"><div class="number" id="totalItems">0</div><div class="label">المنتجات المباعة</div></div>
        <div class="stat-card"><div class="number" id="uniqueCustomers">0</div><div class="label">العملاء</div></div>
    </div>

    <div class="orders-container">
        <table class="orders-table">
            <thead><tr><th>#</th><th>العميل</th><th>التاريخ</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th></tr></thead>
            <tbody id="ordersBody"></tbody>
        </table>
    </div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> العودة إلى المتجر</a>
</div>

<script>
    // كلمة مرور بسيطة
    const SECRET = 'shop2025';
    const entered = prompt('أدخل كلمة المرور لعرض الطلبات:');
    if (entered !== SECRET) {
        document.body.innerHTML = '<div style="text-align:center; margin-top:4rem;"><h2>🔒 غير مصرح</h2><p>كلمة المرور غير صحيحة.</p><a href="index.html">العودة إلى المتجر</a></div>';
        throw new Error('Access denied');
    }

    let orders = JSON.parse(localStorage.getItem('بيتي_طلبات')) || [];

    function formatDate(d) {
        try { return new Date(d).toLocaleDateString('ar-SA', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' }); }
        catch { return d; }
    }

    function renderOrders() {
        const tbody = document.getElementById('ordersBody');
        if (orders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><i class="fas fa-shopping-bag"></i><h3>لا توجد طلبات بعد</h3></div></td></tr>`;
            updateStats(); return;
        }
        const sorted = [...orders].sort((a,b) => new Date(b.orderDate) - new Date(a.orderDate));
        tbody.innerHTML = sorted.map((order, index) => {
            const statusClass = order.status === 'paid' ? 'status-paid' : order.status === 'shipped' ? 'status-shipped' : 'status-pending';
            const itemCount = order.items.reduce((s,i) => s + i.qty, 0);
            const total = order.total || order.items.reduce((s,i) => s + i.price*i.qty, 0);
            const statusText = order.status === 'paid' ? 'مدفوع' : order.status === 'shipped' ? 'تم الشحن' : 'معلق';
            return `
                <tr class="order-row" data-index="${index}">
                    <td><strong>#${String(order.id || index+1).padStart(4,'0')}</strong></td>
                    <td>${order.customerName || 'زائر'}<br><small>${order.customerEmail || '—'}</small></td>
                    <td>${formatDate(order.orderDate)}</td>
                    <td>${itemCount}</td>
                    <td>${total.toFixed(2)} ر.س</td>
                    <td><span class="order-status ${statusClass}">${statusText}</span></td>
                </tr>
                <tr class="order-details" id="details-${index}">
                    <td colspan="6">
                        <h4>المنتجات</h4>
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-meta">
                                        <span>اللون: ${item.selectedColor || '—'}</span>
                                        <span>المقاس: ${item.selectedSize || '—'}</span>
                                        ${item.customHeight ? `<span>الارتفاع: ${item.customHeight}</span>` : ''}
                                        ${item.orderDate ? `<span>التوصيل: ${formatDate(item.orderDate)}</span>` : ''}
                                        <span>الكمية: ${item.qty}</span>
                                    </div>
                                    <div class="item-price">${(item.price * item.qty).toFixed(2)} ر.س</div>
                                </div>
                            `).join('')}
                        </div>
                        ${order.notes ? `<p style="margin-top:0.8rem;">📝 ${order.notes}</p>` : ''}
                        ${order.deliveryName ? `<p style="margin-top:0.5rem; font-size:0.8rem;">🚚 التوصيل: ${order.deliveryName} | ${order.deliveryPhone} | ${order.deliveryAddress}</p>` : ''}
                        <div style="margin-top:0.8rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
                            <button class="btn btn-outline update-status" data-order-id="${order.id}" data-status="shipped">تم الشحن</button>
                            <button class="btn btn-outline update-status" data-order-id="${order.id}" data-status="delivered">تم التوصيل</button>
                            <button class="btn btn-danger delete-order" data-order-id="${order.id}">حذف</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');

        document.querySelectorAll('.order-row').forEach(row => {
            row.addEventListener('click', function(e) {
                if (e.target.closest('button')) return;
                const idx = this.dataset.index;
                const details = document.getElementById(`details-${idx}`);
                if (details) {
                    details.classList.toggle('open');
                    this.classList.toggle('expanded');
                }
            });
        });

        document.querySelectorAll('.update-status').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const id = this.dataset.orderId;
                const newStatus = this.dataset.status;
                const order = orders.find(o => o.id == id);
                if (order) { order.status = newStatus; localStorage.setItem('بيتي_طلبات', JSON.stringify(orders)); renderOrders(); }
            });
        });

        document.querySelectorAll('.delete-order').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!confirm('حذف هذا الطلب نهائياً؟')) return;
                const id = this.dataset.orderId;
                orders = orders.filter(o => o.id != id);
                localStorage.setItem('بيتي_طلبات', JSON.stringify(orders));
                renderOrders();
            });
        });
        updateStats();
    }

    function updateStats() {
        document.getElementById('totalOrders').innerText = orders.length;
        const revenue = orders.reduce((s,o) => s + (o.total || o.items.reduce((sum,i) => sum + i.price*i.qty, 0)), 0);
        document.getElementById('totalRevenue').innerText = revenue.toFixed(2);
        const items = orders.reduce((s,o) => s + o.items.reduce((sum,i) => sum + i.qty, 0), 0);
        document.getElementById('totalItems').innerText = items;
        const customers = new Set(orders.map(o => o.customerEmail || 'guest')).size;
        document.getElementById('uniqueCustomers').innerText = customers;
    }

    renderOrders();
</script>
</body>
</html>
